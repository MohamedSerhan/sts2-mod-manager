name: Nexus find thread ID (one-off diagnostic)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Explore CommentsSearchFilter and search mod 856 comments
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          echo "=== CommentsSearchFilter fields ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"CommentsSearchFilter\") { inputFields { name type { name kind ofType { name } } } } }"}' | jq .

          echo
          echo "=== Comment type fields ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"Comment\") { fields { name type { name kind ofType { name } } } } }"}' | jq '[.data.__type.fields[] | {name, type: (.type.name // .type.ofType.name // .type.kind)}]'

          echo
          echo "=== searchComments with uid filter (mod uid 38293928411992) ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { searchComments(filter: {modUid: \"38293928411992\"}, first: 3) { nodes { id body threadId } pageInfo { hasNextPage } totalCount } }"}' | jq .
