name: Nexus find thread ID (one-off diagnostic)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Probe searchComments filter formats and BaseFilterValue
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          echo "=== BaseFilterValue fields ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"BaseFilterValue\") { inputFields { name type { name kind ofType { name } } } } }"}' | jq .

          echo
          echo "=== searchComments with threadId as BaseFilterValue matches format ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { searchComments(filter: {threadId: {matches: [\"16866026\"]}}, first: 3) { nodes { id body } totalCount } }"}' | jq .

          echo
          echo "=== searchComments with no filter at all - just first 1 ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { searchComments(first: 1) { nodes { id body createdAt creator { name memberId } } totalCount pageInfo { hasNextPage } } }"}' | jq .
