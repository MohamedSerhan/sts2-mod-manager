name: Nexus triage

on:
  # Uncomment after Day 1 dry-run verification (see RELEASING.md "Operator runbook").
  # schedule:
  #   - cron: "0 * * * *"  # every hour at :00
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: print what would file, do not create issues or commit state"
        required: false
        default: "true"
        type: boolean
      discover_thread_id:
        description: "Discovery mode: print the posts thread_id and exit (use once to populate NEXUSMODS_POSTS_THREAD_ID)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: nexus-triage
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need full history for the state commit + rebase.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install curl-impersonate-chrome
        # curl-impersonate lets us bypass Cloudflare TLS fingerprinting on Nexus.
        # Pinned to v0.6.1 (latest stable as of 2026-05-27); the latest chrome
        # version available in this release is curl_chrome116.
        # See https://github.com/lwthiker/curl-impersonate/releases
        #
        # The tarball ships two real binaries (curl-impersonate-chrome,
        # curl-impersonate-ff) and a set of shell wrappers (curl_chrome116,
        # curl_chrome110, etc.) that invoke them with the right TLS args.
        # We need to install BOTH the binaries and the wrappers.
        run: |
          CURL_IMP_VERSION="0.6.1"
          CURL_IMP_ARCHIVE="curl-impersonate-v${CURL_IMP_VERSION}.x86_64-linux-gnu.tar.gz"
          CURL_IMP_URL="https://github.com/lwthiker/curl-impersonate/releases/download/v${CURL_IMP_VERSION}/${CURL_IMP_ARCHIVE}"
          STAGE=$(mktemp -d)
          wget -q "${CURL_IMP_URL}" -O "${STAGE}/${CURL_IMP_ARCHIVE}"
          tar -xf "${STAGE}/${CURL_IMP_ARCHIVE}" -C "${STAGE}"
          # Install every binary and wrapper from the extracted archive.
          sudo install -m 0755 "${STAGE}"/curl-impersonate-chrome /usr/local/bin/
          sudo install -m 0755 "${STAGE}"/curl-impersonate-ff /usr/local/bin/
          sudo install -m 0755 "${STAGE}"/curl_chrome* /usr/local/bin/
          sudo install -m 0755 "${STAGE}"/curl_ff* /usr/local/bin/
          sudo install -m 0755 "${STAGE}"/curl_edge* /usr/local/bin/ 2>/dev/null || true
          sudo install -m 0755 "${STAGE}"/curl_safari* /usr/local/bin/ 2>/dev/null || true
          rm -rf "${STAGE}"
          curl_chrome116 --version

      - name: Run triage script
        env:
          NEXUSMODS_GAME_ID:          ${{ vars.NEXUSMODS_GAME_ID }}
          NEXUSMODS_MOD_ID:           ${{ vars.NEXUSMODS_MOD_ID }}
          NEXUSMODS_OBJECT_TYPE:      ${{ vars.NEXUSMODS_OBJECT_TYPE }}
          NEXUSMODS_POSTS_THREAD_ID:  ${{ vars.NEXUSMODS_POSTS_THREAD_ID }}
          NEXUSMODS_POSTS_URL:        ${{ vars.NEXUSMODS_POSTS_URL }}
          CURL_IMPERSONATE_BIN:       curl_chrome116
          GITHUB_TOKEN:               ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.discover_thread_id }}" = "true" ]; then
            node scripts/nexus-triage.mjs --discover-thread-id
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/nexus-triage.mjs --dry-run
          else
            node scripts/nexus-triage.mjs
          fi

      - name: Commit updated state (if changed)
        if: ${{ inputs.dry_run != 'true' && inputs.discover_thread_id != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet scripts/nexus-triage-state.json; then
            echo "No state changes to commit."
          else
            git add scripts/nexus-triage-state.json
            git pull --rebase
            git commit -m "chore(triage): update Nexus triage state [skip ci]"
            git push
          fi
