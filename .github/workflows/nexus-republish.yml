name: Nexus republish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to republish, with or without v prefix"
        required: true
        default: "1.8.0"
        type: string
      asset:
        description: "Release asset to republish"
        required: true
        default: "windows"
        type: choice
        options:
          - windows
          - macos
          - linux
      expected_sha256:
        description: "Expected SHA256 for the exact GitHub release asset"
        required: false
        default: ""
        type: string
      repack_windows_zip:
        description: "Repack the same README and EXE before uploading to Nexus"
        required: false
        default: false
        type: boolean
      rebuild_windows_zip:
        description: "Rebuild the Windows portable zip from the release tag before uploading to Nexus"
        required: false
        default: false
        type: boolean
      source_ref:
        description: "Optional Git ref to build for rebuilt Windows uploads; defaults to the release tag"
        required: false
        default: ""
        type: string
      diagnose_only:
        description: "Only print Nexus file group state; do not upload"
        required: false
        default: false
        type: boolean

concurrency:
  group: nexus-republish-${{ inputs.asset }}-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  republish-release-asset:
    if: ${{ !inputs.rebuild_windows_zip }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Diagnose Windows Nexus state
        if: ${{ inputs.diagnose_only }}
        env:
          NEXUS_API_KEY:         ${{ secrets.NEXUS_API_KEY }}
          NEXUS_FILE_GROUP_ID:   ${{ secrets.NEXUS_FILE_GROUP_ID }}
          NEXUS_FILE_GROUP_ID_MACOS: ${{ secrets.NEXUS_FILE_GROUP_ID_MACOS }}
          NEXUS_FILE_GROUP_ID_LINUX: ${{ secrets.NEXUS_FILE_GROUP_ID_LINUX }}
          NEXUS_ASSET_KEY:       ${{ inputs.asset }}
          NEXUSMODS_MOD_ID:      ${{ vars.NEXUSMODS_MOD_ID || '856' }}
          NEXUSMODS_GAME_DOMAIN: slaythespire2
        run: |
          node --input-type=module <<'NODE'
          const apiBase = process.env.NEXUSMODS_API_BASE || 'https://api.nexusmods.com/v3';
          const legacyApiBase = process.env.NEXUSMODS_LEGACY_API_BASE || 'https://api.nexusmods.com/v1';

          async function request(baseUrl, endpoint) {
            const response = await fetch(`${baseUrl}${endpoint}`, {
              headers: {
                'Content-Type': 'application/json',
                apikey: process.env.NEXUS_API_KEY,
                'User-Agent': 'sts2-mod-manager-nexus-diagnostic',
              },
            });
            const text = await response.text();
            let body = text;
            try {
              body = text ? JSON.parse(text) : null;
            } catch {
              // Keep plain text body.
            }
            if (!response.ok) {
              throw new Error(`${endpoint} failed with ${response.status}: ${text}`);
            }
            return body;
          }

          function groupsFrom(body) {
            return body?.data?.groups || body?.data?.data?.groups || body?.groups || [];
          }

          function print(label, value) {
            console.log(`\n## ${label}`);
            console.log(JSON.stringify(value, null, 2).slice(0, 20000));
          }

          function compactFile(file) {
            return {
              file_id: file?.file_id,
              name: file?.name,
              version: file?.version,
              mod_version: file?.mod_version,
              category_name: file?.category_name,
              is_primary: file?.is_primary,
              file_name: file?.file_name,
              size_kb: file?.size_kb ?? file?.size,
              uploaded_time: file?.uploaded_time,
              external_virus_scan_url: file?.external_virus_scan_url,
            };
          }

          function compactUpdate(update) {
            return {
              old_file_id: update?.old_file_id,
              new_file_id: update?.new_file_id,
              old_file_name: update?.old_file_name,
              new_file_name: update?.new_file_name,
              uploaded_time: update?.uploaded_time,
            };
          }

          function timestampSort(left, right) {
            return String(right?.uploaded_time || '').localeCompare(String(left?.uploaded_time || ''));
          }

          function isRecentOrTargetVersion(row) {
            const text = JSON.stringify(row);
            return /1\.7\.(?:9|10|11)\b/.test(text) || /2026-06-(?:15|16|17)T/.test(text);
          }

          const gameDomain = process.env.NEXUSMODS_GAME_DOMAIN || 'slaythespire2';
          const gameScopedModId = process.env.NEXUSMODS_MOD_ID || '856';
          const releaseAssets = [
            {
              key: 'macos',
              groupEnv: 'NEXUS_FILE_GROUP_ID_MACOS',
              labelPattern: /macos|mac os|universal/i,
            },
            {
              key: 'linux',
              groupEnv: 'NEXUS_FILE_GROUP_ID_LINUX',
              labelPattern: /linux|appimage/i,
            },
            {
              key: 'windows',
              groupEnv: 'NEXUS_FILE_GROUP_ID',
              labelPattern: /windows|portable/i,
            },
          ];
          const selectedAsset = releaseAssets.find((asset) => asset.key === process.env.NEXUS_ASSET_KEY);
          if (!selectedAsset) {
            throw new Error(`Unknown Nexus asset key: ${process.env.NEXUS_ASSET_KEY}`);
          }
          const configuredGroupId = String(process.env[selectedAsset.groupEnv] || '').trim();

          const mod = await request(apiBase, `/games/${encodeURIComponent(gameDomain)}/mods/${encodeURIComponent(gameScopedModId)}`);
          print('mod', mod);
          const modId = mod?.data?.id || mod?.id;
          if (!modId) {
            throw new Error('Nexus mod UUID was not present in mod response');
          }

          let groups = [];
          try {
            const groupsBody = await request(apiBase, `/mods/${encodeURIComponent(modId)}/file-update-groups`);
            print('file-update-groups', groupsBody);
            groups = groupsFrom(groupsBody);
          } catch (error) {
            print('file-update-groups error', error instanceof Error ? error.message : String(error));
          }
          const selectedGroup = groups.find((group) => (
            String(group?.id || '') === configuredGroupId
            || selectedAsset.labelPattern.test(String(group?.name || ''))
          ));
          print('selected-group', selectedGroup || null);

          const groupId = selectedGroup?.id || configuredGroupId;
          if (!groupId) {
            throw new Error(`Could not determine ${selectedAsset.key} Nexus file group id`);
          }

          for (const endpoint of [
            `/mod-file-update-groups/${encodeURIComponent(groupId)}`,
            `/mod-file-update-groups/${encodeURIComponent(groupId)}/versions`,
          ]) {
            try {
              print(endpoint, await request(apiBase, endpoint));
            } catch (error) {
              print(`${endpoint} error`, error instanceof Error ? error.message : String(error));
            }
          }

          try {
            const legacyFiles = await request(legacyApiBase, `/games/${encodeURIComponent(gameDomain)}/mods/${encodeURIComponent(gameScopedModId)}/files.json`);
            const files = Array.isArray(legacyFiles?.files) ? legacyFiles.files : [];
            const updates = Array.isArray(legacyFiles?.file_updates) ? legacyFiles.file_updates : [];
            print('legacy-files-summary', {
              file_count: files.length,
              file_update_count: updates.length,
              latest_files: files.toSorted(timestampSort).slice(0, 12).map(compactFile),
              target_files: files.filter(isRecentOrTargetVersion).toSorted(timestampSort).map(compactFile),
              latest_updates: updates.toSorted(timestampSort).slice(0, 12).map(compactUpdate),
              target_updates: updates.filter(isRecentOrTargetVersion).toSorted(timestampSort).map(compactUpdate),
            });
          } catch (error) {
            print('legacy-files error', error instanceof Error ? error.message : String(error));
          }
          NODE

      - name: Download GitHub release asset
        if: ${{ !inputs.diagnose_only }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          ASSET_KEY="${{ inputs.asset }}"

          case "$ASSET_KEY" in
            macos)
              ASSET="STS2.Mod.Manager_${VERSION}_universal.dmg"
              ;;
            linux)
              ASSET="STS2.Mod.Manager_${VERSION}_amd64.AppImage"
              ;;
            windows)
              ASSET="STS2.Mod.Manager_${VERSION}_x64_portable.zip"
              ;;
            *)
              echo "Unknown asset key: ${ASSET_KEY}" >&2
              exit 1
              ;;
          esac

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET_KEY=${ASSET_KEY}" >> "$GITHUB_ENV"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

          mkdir -p nexus-assets
          gh release download "v${VERSION}" \
            -R "$GITHUB_REPOSITORY" \
            -D nexus-assets \
            -p "$ASSET"

      - name: Verify GitHub release asset
        if: ${{ !inputs.diagnose_only }}
        run: |
          set -euo pipefail
          ASSET_PATH="nexus-assets/${ASSET}"
          ACTUAL_SHA="$(sha256sum "$ASSET_PATH" | awk '{ print toupper($1) }')"
          EXPECTED_SHA="$(printf '%s' "${{ inputs.expected_sha256 }}" | tr '[:lower:]' '[:upper:]')"

          echo "ASSET_SHA256=${ACTUAL_SHA}" >> "$GITHUB_ENV"
          if [ -n "$EXPECTED_SHA" ] && [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "Expected $EXPECTED_SHA but downloaded $ACTUAL_SHA" >&2
            exit 1
          fi

          if [ "$ASSET_KEY" != "windows" ]; then
            echo "Verified ${ASSET} as ${ACTUAL_SHA}"
            exit 0
          fi

          python3 - <<'PY'
          import os
          import zipfile

          zip_path = os.path.join("nexus-assets", os.environ["ASSET"])
          expected = ["README.txt", "STS2 Mod Manager.exe"]
          with zipfile.ZipFile(zip_path) as archive:
              entries = sorted(info.filename for info in archive.infolist() if not info.is_dir())
          if entries != expected:
              raise SystemExit(f"Unexpected zip entries: {entries!r}")
          print("Verified zip entries:", ", ".join(entries))
          PY

      - name: Repack Windows portable zip
        if: ${{ !inputs.diagnose_only && inputs.repack_windows_zip && inputs.asset == 'windows' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import zipfile

          zip_path = os.path.join("nexus-assets", os.environ["ASSET"])
          names = ["README.txt", "STS2 Mod Manager.exe"]
          with zipfile.ZipFile(zip_path, "r") as source:
              payload = {name: source.read(name) for name in names}

          tmp_path = f"{zip_path}.tmp"
          with zipfile.ZipFile(tmp_path, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=9) as target:
              for name in names:
                  info = zipfile.ZipInfo(name)
                  info.compress_type = zipfile.ZIP_DEFLATED
                  info.external_attr = 0o644 << 16
                  target.writestr(info, payload[name])
          os.replace(tmp_path, zip_path)
          PY

          REPACKED_SHA="$(sha256sum "nexus-assets/${ASSET}" | awk '{ print toupper($1) }')"
          echo "ASSET_SHA256=${REPACKED_SHA}" >> "$GITHUB_ENV"
          echo "Repacked ${ASSET} as ${REPACKED_SHA}"

      - name: Publish release asset to Nexus
        if: ${{ !inputs.diagnose_only }}
        env:
          NEXUS_API_KEY:             ${{ secrets.NEXUS_API_KEY }}
          NEXUS_FILE_GROUP_ID:       ${{ secrets.NEXUS_FILE_GROUP_ID }}
          NEXUS_FILE_GROUP_ID_MACOS: ${{ secrets.NEXUS_FILE_GROUP_ID_MACOS }}
          NEXUS_FILE_GROUP_ID_LINUX: ${{ secrets.NEXUS_FILE_GROUP_ID_LINUX }}
          NEXUS_ALLOW_BOOTSTRAP:     "false"
          NEXUSMODS_MOD_ID:          ${{ vars.NEXUSMODS_MOD_ID || '856' }}
          NEXUSMODS_GAME_DOMAIN:     slaythespire2
        run: node scripts/nexus-publish-release.mjs --version "$VERSION" --asset-dir nexus-assets --only "$ASSET_KEY"

      - name: Summarize republish
        if: ${{ !inputs.diagnose_only }}
        run: |
          {
            echo "### Nexus ${ASSET_KEY} republish"
            echo
            echo "- Version: ${VERSION}"
            echo "- Asset: ${ASSET}"
            echo "- SHA256: ${ASSET_SHA256}"
            echo "- Repacked: ${{ inputs.repack_windows_zip }}"
          } >> "$GITHUB_STEP_SUMMARY"

  rebuild-and-republish-windows:
    if: ${{ inputs.asset == 'windows' && inputs.rebuild_windows_zip && !inputs.diagnose_only }}
    runs-on: windows-latest
    steps:
      - name: Checkout publisher workflow
        uses: actions/checkout@v6

      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref || (startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version)) }}
          path: release-source

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: release-source/src-tauri
          key: nexus-rebuild-windows-${{ inputs.version }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: release-source/package-lock.json

      - name: Install frontend dependencies
        working-directory: release-source
        run: npm ci

      - name: Build Windows app from release source
        working-directory: release-source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          STS2_BUG_REPORT_ENDPOINT: ${{ vars.STS2_BUG_REPORT_ENDPOINT }}
          STS2_BUG_REPORT_KEY: ${{ secrets.STS2_BUG_REPORT_KEY }}
        run: npm run tauri build -- --no-bundle

      - name: Package rebuilt portable zip
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ inputs.version }}".TrimStart("v")
          $tag = "v$version"
          $asset = "STS2.Mod.Manager_${version}_x64_portable.zip"

          "VERSION=$version" >> $env:GITHUB_ENV
          "ASSET=$asset" >> $env:GITHUB_ENV

          New-Item -ItemType Directory -Path original-assets, original-exe, portable-staging, nexus-assets -Force | Out-Null
          gh release download $tag -R $env:GITHUB_REPOSITORY -D original-assets -p $asset
          Expand-Archive -Path (Join-Path "original-assets" $asset) -DestinationPath original-exe -Force

          $originalExePath = Join-Path "original-exe" "STS2 Mod Manager.exe"
          if (-not (Test-Path -LiteralPath $originalExePath)) {
            throw "Original portable zip did not contain STS2 Mod Manager.exe"
          }
          $originalExeSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $originalExePath).Hash.ToUpperInvariant()

          $candidates = Get-ChildItem "release-source/src-tauri/target/release/*.exe" |
                        Where-Object {
                          $_.Name -notlike "*-setup.exe" -and
                          $_.Name -notlike "*build-script*" -and
                          $_.Name -notlike "*.tmp.exe"
                        }
          if ($candidates.Count -ne 1) {
            throw "Expected exactly one rebuilt app exe in target/release, found $($candidates.Count): $($candidates.Name -join ', ')"
          }

          $rebuiltExe = $candidates[0]
          $rebuiltExeSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $rebuiltExe.FullName).Hash.ToUpperInvariant()
          if ($rebuiltExeSha -eq $originalExeSha) {
            throw "Rebuilt exe SHA256 still matches the original GitHub portable exe ($rebuiltExeSha); refusing to reupload the same binary."
          }

          Copy-Item $rebuiltExe.FullName (Join-Path "portable-staging" "STS2 Mod Manager.exe")
          Copy-Item "release-source/scripts/portable-README.txt" (Join-Path "portable-staging" "README.txt")

          $zipPath = Join-Path "nexus-assets" $asset
          Compress-Archive -Path "portable-staging/*" -DestinationPath $zipPath -Force

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipPath))
          try {
            $entries = $archive.Entries |
              Where-Object { -not [string]::IsNullOrEmpty($_.Name) } |
              ForEach-Object { $_.FullName } |
              Sort-Object
          } finally {
            $archive.Dispose()
          }
          $expected = @("README.txt", "STS2 Mod Manager.exe")
          if (($entries -join "|") -ne ($expected -join "|")) {
            throw "Unexpected rebuilt zip entries: $($entries -join ', ')"
          }

          $zipSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $zipPath).Hash.ToUpperInvariant()
          "ORIGINAL_EXE_SHA256=$originalExeSha" >> $env:GITHUB_ENV
          "REBUILT_EXE_SHA256=$rebuiltExeSha" >> $env:GITHUB_ENV
          "ZIP_SHA256=$zipSha" >> $env:GITHUB_ENV
          Write-Host "Original exe SHA256: $originalExeSha"
          Write-Host "Rebuilt exe SHA256:  $rebuiltExeSha"
          Write-Host "Rebuilt zip SHA256:  $zipSha"

      - name: Publish rebuilt Windows portable zip to Nexus
        env:
          NEXUS_API_KEY:             ${{ secrets.NEXUS_API_KEY }}
          NEXUS_FILE_GROUP_ID:       ${{ secrets.NEXUS_FILE_GROUP_ID }}
          NEXUS_ALLOW_BOOTSTRAP:     "false"
          NEXUSMODS_MOD_ID:          ${{ vars.NEXUSMODS_MOD_ID || '856' }}
          NEXUSMODS_GAME_DOMAIN:     slaythespire2
        run: node scripts/nexus-publish-release.mjs --version "$env:VERSION" --asset-dir nexus-assets --only windows

      - name: Summarize rebuilt republish
        shell: pwsh
        run: |
          @(
            "### Nexus Windows rebuilt republish"
            ""
            "- Version: $env:VERSION"
            "- Asset: $env:ASSET"
            "- Original EXE SHA256: $env:ORIGINAL_EXE_SHA256"
            "- Rebuilt EXE SHA256: $env:REBUILT_EXE_SHA256"
            "- Rebuilt ZIP SHA256: $env:ZIP_SHA256"
            "- Source ref: ${{ inputs.source_ref || (startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version)) }}"
          ) -join "`n" >> $env:GITHUB_STEP_SUMMARY
