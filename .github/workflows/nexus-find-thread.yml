name: Nexus find thread ID (one-off diagnostic)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Try searchComments with various filter approaches
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          echo "=== CommentsSearchFilter nested filter input type ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"CommentsSearchFilterInput\") { inputFields { name type { name kind ofType { name } } } } }"}' | jq .

          echo
          echo "=== searchComments no filter first:3 ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { searchComments(first: 3) { nodes { id body } totalCount } }"}' | jq '{totalCount: .data.searchComments.totalCount, firstId: .data.searchComments.nodes[0].id, firstBody: .data.searchComments.nodes[0].body}'

          echo
          echo "=== searchComments sort args ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"CommentsSearchSort\") { inputFields { name } enumValues { name } } }"}' | jq .

          echo
          echo "=== CommentThread type fields ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"CommentThread\") { fields { name type { name kind ofType { name } } } } }"}' | jq '[.data.__type.fields[] | {name, type: (.type.name // .type.ofType.name // .type.kind)}]'
