name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    # Job-level permissions are also declared here in addition to the
    # workflow-level block above. tauri-action's "Create a release" call has
    # been seen to fail with "Resource not accessible by integration" on tag
    # pushes when only the workflow-level permissions block is present;
    # repeating the grant at the job level is the documented workaround.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            squashfs-tools

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On tag pushes, let tauri-action create/update the release and upload
          # signed bundles (consumed by tauri-plugin-updater).
          # NOTE: includeUpdaterJson is OFF here — latest.json is assembled by the
          # publish-updater job AFTER all platforms finish to avoid race conditions.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Patch AppImage AppRun (Arch/Wayland LD_PRELOAD fix)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" ! -name "*.tar.gz" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found, skipping patch."
            exit 0
          fi
          TAG=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          bash scripts/patch-appimage-apprun.sh "$APPIMAGE" "$TAG"

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.nsis
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: warn
          retention-days: 7

  # After all platform builds finish, assemble the updater manifest from the
  # per-platform .sig files that tauri-action uploaded to the release.  Running
  # this in a single job after all builds eliminates the race condition where an
  # early-finishing platform would publish an incomplete latest.json.
  publish-updater:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Assemble and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-updater.sh "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}"

  # After all platform builds finish, format the release body with download links
  format-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Get the list of assets for this release
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')

          # Helper: link if asset exists
          link() {
            local file="$1" label="$2" desc="$3" bold="${4:-false}"
            if echo "$ASSETS" | grep -qF "$file"; then
              if [ "$bold" = "true" ]; then
                echo "- **[${label}](${BASE}/${file})** - ${desc}"
              else
                echo "- [${label}](${BASE}/${file}) - ${desc}"
              fi
            fi
          }

          # Build the body
          BODY="## STS2 Mod Manager ${TAG}

          ### Download for your platform

          #### Windows
          $(link "STS2.Mod.Manager_${VERSION}_x64-setup.exe" "STS2.Mod.Manager_${VERSION}_x64-setup.exe" "Recommended. Double-click to install." true)
          $(link "STS2.Mod.Manager_${VERSION}_x64_en-US.msi" "STS2.Mod.Manager_${VERSION}_x64_en-US.msi" "Alternative MSI installer.")

          > **Windows SmartScreen warning:** The installer isn't code-signed yet, so when you run it you'll see *\"Windows protected your PC\"* from Microsoft Defender SmartScreen. To install: click **More info**, then click **Run anyway**. Your browser may also flag the download as untrusted -- choose **Keep** (Edge/Chrome) to save the file.

          #### macOS
          $(link "STS2.Mod.Manager_${VERSION}_universal.dmg" "STS2.Mod.Manager_${VERSION}_universal.dmg" "Works on both Intel and Apple Silicon Macs. Open the DMG and drag to Applications." true)

          > **macOS security warning:** The app isn't notarized by Apple, so on first launch you'll see *\"STS2 Mod Manager cannot be opened because Apple cannot check it for malicious software\"* (or *\"unidentified developer\"*). To open it: **right-click (or Control-click) the app in Applications and choose Open**, then click **Open** in the dialog. You only need to do this once. Alternatively, go to **System Settings → Privacy & Security** and click **Open Anyway**.

          #### Linux
          $(link "STS2.Mod.Manager_${VERSION}_amd64.deb" "STS2.Mod.Manager_${VERSION}_amd64.deb" "For Ubuntu, Debian, Pop!_OS, Linux Mint. Install with \`sudo dpkg -i\`." true)
          $(link "STS2.Mod.Manager-${VERSION}-1.x86_64.rpm" "STS2.Mod.Manager-${VERSION}-1.x86_64.rpm" "For Fedora, openSUSE. Install with \`sudo rpm -i\`." true)
          $(link "STS2.Mod.Manager_${VERSION}_amd64.AppImage" "STS2.Mod.Manager_${VERSION}_amd64.AppImage" "Portable, no install needed. Works on all distros including Arch-based (CachyOS, Manjaro, EndeavourOS)." true)

          > **Arch/CachyOS/Manjaro users:** The AppImage now includes a built-in fix for the blank white screen issue. The AppRun script preloads the system \`libwayland-client.so\` before launching, which prevents WebKit's GPU subprocess from failing EGL initialisation. Simply download, mark executable, and run — no workarounds needed.

          ---

          **Full Changelog**: https://github.com/${REPO}/compare/$(gh release list --limit 2 --json tagName --jq '.[1].tagName')...${TAG}"

          # Strip leading whitespace from heredoc-style indentation
          BODY=$(echo "$BODY" | sed 's/^          //')

          # Update the release body
          gh release edit "$TAG" --notes "$BODY"
