name: Nexus find thread ID (one-off diagnostic)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Explore comment/searchComments/commentThread query args
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          echo "=== Args for 'comment' root query ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"Query\") { fields { name args { name type { name kind ofType { name } } } } } }"}' | \
            jq '[.data.__type.fields[] | select(.name == "comment" or .name == "commentThread" or .name == "searchComments") | {name, args: [.args[] | {name, type: (.type.name // .type.ofType.name // .type.kind)}]}]'

          echo
          echo "=== Mod 856 via correct modId arg ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { mod(modId: 856, gameId: 8916) { modId name uid } }"}' | jq .

          echo
          echo "=== searchComments for mod 856 (first 3) ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { searchComments(modId: 856, gameId: 8916, first: 3) { nodes { id body threadId } pageInfo { hasNextPage } totalCount } }"}' | jq .
