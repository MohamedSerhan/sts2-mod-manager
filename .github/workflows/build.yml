name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On tag pushes, let tauri-action create/update the release and upload
          # signed bundles (consumed by tauri-plugin-updater).
          # NOTE: includeUpdaterJson is OFF here — latest.json is assembled by the
          # publish-updater job AFTER all platforms finish to avoid race conditions.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.nsis
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: warn
          retention-days: 7

  # After all platform builds finish, assemble the updater manifest from the
  # per-platform .sig files that tauri-action uploaded to the release.  Running
  # this in a single job after all builds eliminates the race condition where an
  # early-finishing platform would publish an incomplete latest.json.
  publish-updater:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Assemble and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Download all .sig files from the release
          SIGDIR=$(mktemp -d)
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir "$SIGDIR"

          # Helper: read signature for a given asset filename
          sig() {
            local f="${SIGDIR}/$1.sig"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          # Discover asset filenames from the release
          ASSETS_JSON=$(gh release view "$TAG" --repo "$REPO" --json assets)
          asset_name() {
            echo "$ASSETS_JSON" | jq -r ".assets[] | select(.name | test(\"$1\")) | .name" | head -1
          }

          NSIS=$(asset_name 'setup\.exe$')
          MSI=$(asset_name '\.msi$')
          APPIMAGE=$(asset_name '\.AppImage$')
          DEB=$(asset_name '\.deb$')
          RPM=$(asset_name '\.rpm$')
          APP_TAR=$(asset_name '\.app\.tar\.gz$')

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Build the platforms object incrementally with jq
          PLATFORMS="{}"
          add_platform() {
            local key="$1" file="$2"
            [ -z "$file" ] && return
            local signature
            signature=$(sig "$file")
            [ -z "$signature" ] && return
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg k "$key" --arg sig "$signature" --arg url "${BASE}/${file}" \
              '. + {($k): {signature: $sig, url: $url}}')
          }

          # macOS (universal binary serves both architectures)
          add_platform "darwin-aarch64"     "$APP_TAR"
          add_platform "darwin-x86_64"      "$APP_TAR"
          add_platform "darwin-aarch64-app"  "$APP_TAR"
          add_platform "darwin-x86_64-app"   "$APP_TAR"

          # Linux
          add_platform "linux-x86_64"           "$APPIMAGE"
          add_platform "linux-x86_64-appimage"  "$APPIMAGE"
          add_platform "linux-x86_64-deb"       "$DEB"
          add_platform "linux-x86_64-rpm"       "$RPM"

          # Windows — NSIS (.exe) is the preferred/default installer
          if [ -n "$NSIS" ]; then
            add_platform "windows-x86_64"       "$NSIS"
            add_platform "windows-x86_64-nsis"  "$NSIS"
          elif [ -n "$MSI" ]; then
            add_platform "windows-x86_64"       "$MSI"
          fi
          [ -n "$MSI" ] && add_platform "windows-x86_64-msi" "$MSI"

          # Assemble final JSON
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: "", pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "Generated latest.json with platforms:"
          jq -r '.platforms | keys[]' latest.json

          # Upload to the release (replace if a stale one exists)
          gh release delete-asset "$TAG" --repo "$REPO" "latest.json" --yes 2>/dev/null || true
          gh release upload "$TAG" --repo "$REPO" latest.json

  # After all platform builds finish, format the release body with download links
  format-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Get the list of assets for this release
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')

          # Helper: link if asset exists
          link() {
            local file="$1" label="$2" desc="$3" bold="${4:-false}"
            if echo "$ASSETS" | grep -qF "$file"; then
              if [ "$bold" = "true" ]; then
                echo "- **[${label}](${BASE}/${file})** - ${desc}"
              else
                echo "- [${label}](${BASE}/${file}) - ${desc}"
              fi
            fi
          }

          # Build the body
          BODY="## STS2 Mod Manager ${TAG}

          ### Download for your platform

          #### Windows
          $(link "STS2.Mod.Manager_${VERSION}_x64-setup.exe" "STS2.Mod.Manager_${VERSION}_x64-setup.exe" "Recommended. Double-click to install." true)
          $(link "STS2.Mod.Manager_${VERSION}_x64_en-US.msi" "STS2.Mod.Manager_${VERSION}_x64_en-US.msi" "Alternative MSI installer.")

          #### macOS
          $(link "STS2.Mod.Manager_${VERSION}_universal.dmg" "STS2.Mod.Manager_${VERSION}_universal.dmg" "Works on both Intel and Apple Silicon Macs. Open the DMG and drag to Applications." true)

          #### Linux
          $(link "STS2.Mod.Manager_${VERSION}_amd64.deb" "STS2.Mod.Manager_${VERSION}_amd64.deb" "For Ubuntu, Debian, Pop!_OS, Linux Mint. Install with \`sudo dpkg -i\`." true)
          $(link "STS2.Mod.Manager-${VERSION}-1.x86_64.rpm" "STS2.Mod.Manager-${VERSION}-1.x86_64.rpm" "For Fedora, openSUSE. Install with \`sudo rpm -i\`." true)
          $(link "STS2.Mod.Manager_${VERSION}_amd64.AppImage" "STS2.Mod.Manager_${VERSION}_amd64.AppImage" "Portable, no install needed. **Note:** May show a white screen on Arch-based distros (CachyOS, Manjaro) -- use the .deb or .rpm instead.")

          > **Arch/CachyOS users:** The AppImage has a known WebKitGTK issue. Use the .deb package with \`debtap\`:
          > \`\`\`
          > yay -S debtap && sudo debtap -u
          > sudo debtap STS2.Mod.Manager_${VERSION}_amd64.deb
          > sudo pacman -U sts2-mod-manager-*.pkg.tar.zst
          > \`\`\`

          ---

          **Full Changelog**: https://github.com/${REPO}/compare/$(gh release list --limit 2 --json tagName --jq '.[1].tagName')...${TAG}"

          # Strip leading whitespace from heredoc-style indentation
          BODY=$(echo "$BODY" | sed 's/^          //')

          # Update the release body
          gh release edit "$TAG" --notes "$BODY"
