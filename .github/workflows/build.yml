name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**/*.md"
      - ".claude/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    # `labeled` is included so applying the `dev-build` label to an existing PR
    # triggers a dev build. The build job further filters to that label, and the
    # check job skips bare label events (see their `if:` conditions).
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".claude/**"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Cheap pre-flight check: runs on PRs and pushes to main (skipped on bare
  # label events — see its `if:`). The expensive 3-platform bundle build runs on
  # version tags, manual dispatch, and PRs labeled `dev-build`.
  check:
    # Skip on bare label events: check already ran on the PR's commits and a
    # label change can't change its result. Pushes to main and other PR actions
    # still run it.
    if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event.action != 'labeled' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Test nexus-triage script
        run: node --test scripts/nexus-triage.test.mjs

      - name: Test dev-build-stamp script
        run: node --test scripts/dev-build-stamp.test.mjs

  build:
    # Runs on version tags, manual dispatch, or a PR carrying the `dev-build`
    # label. On `labeled` events we also require the just-added label to be
    # `dev-build`, so adding an unrelated label to an already-labeled PR does
    # not kick off a fresh (expensive) 3-platform build.
    if: >-
      ${{ startsWith(github.ref, 'refs/tags/v')
          || github.event_name == 'workflow_dispatch'
          || (github.event_name == 'pull_request'
              && contains(github.event.pull_request.labels.*.name, 'dev-build')
              && (github.event.action != 'labeled'
                  || github.event.label.name == 'dev-build')) }}
    # Job-level permissions are also declared here in addition to the
    # workflow-level block above. tauri-action's "Create a release" call has
    # been seen to fail with "Resource not accessible by integration" on tag
    # pushes when only the workflow-level permissions block is present;
    # repeating the grant at the job level is the documented workaround.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            squashfs-tools

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Stamp dev version + identity (labeled-PR dev builds only)
        if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'dev-build') }}
        shell: bash
        env:
          DEV_PR_NUMBER: ${{ github.event.pull_request.number }}
          DEV_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT=$(printf '%s' "$DEV_HEAD_SHA" | cut -c1-7)
          DEV_SHORT_SHA="$SHORT" node scripts/dev-build-stamp.mjs --stamp

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On tag pushes, let tauri-action create/update the release and upload
          # signed bundles (consumed by tauri-plugin-updater).
          # NOTE: includeUpdaterJson is OFF here — latest.json is assembled by the
          # publish-updater job AFTER all platforms finish to avoid race conditions.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Package portable zip (Windows only)
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG.TrimStart('v')

          # Tauri's cargo binary is sts2-mod-manager.exe (from Cargo.toml).
          # Filter out NSIS *-setup.exe and any build-script intermediates.
          $candidates = Get-ChildItem 'src-tauri/target/release/*.exe' |
                        Where-Object {
                          $_.Name -notlike '*-setup.exe' -and
                          $_.Name -notlike '*build-script*' -and
                          $_.Name -notlike '*.tmp.exe'
                        }
          if ($candidates.Count -ne 1) {
            Write-Error "Expected exactly one app exe in target/release, found $($candidates.Count): $($candidates.Name -join ', ')"
            exit 1
          }
          $exe = $candidates[0]

          $staging = 'portable-staging'
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item $exe.FullName (Join-Path $staging 'STS2 Mod Manager.exe')
          Copy-Item scripts/portable-README.txt (Join-Path $staging 'README.txt')

          $zip = "STS2.Mod.Manager_${version}_x64_portable.zip"
          Compress-Archive -Path "$staging/*" -DestinationPath $zip -Force

          gh release upload "$env:TAG" $zip --clobber

      - name: Package portable zip (dev builds, Windows only)
        if: matrix.platform == 'windows-latest' && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'dev-build')
        shell: pwsh
        run: |
          # Read the (already dev-stamped) version from tauri.conf.json.
          $conf = Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
          $version = $conf.version

          $candidates = Get-ChildItem 'src-tauri/target/release/*.exe' |
                        Where-Object {
                          $_.Name -notlike '*-setup.exe' -and
                          $_.Name -notlike '*build-script*' -and
                          $_.Name -notlike '*.tmp.exe'
                        }
          if ($candidates.Count -ne 1) {
            Write-Error "Expected exactly one app exe in target/release, found $($candidates.Count): $($candidates.Name -join ', ')"
            exit 1
          }
          $exe = $candidates[0]

          $staging = 'portable-staging'
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item $exe.FullName (Join-Path $staging 'STS2 Mod Manager (Dev).exe')
          Copy-Item scripts/portable-README.txt (Join-Path $staging 'README.txt')

          # Repo-root zip; the artifact-upload step captures it. No gh release
          # upload here — publish-dev attaches it to the dev-pr<N> prerelease.
          $zip = "STS2.Mod.Manager_${version}_x64_portable.zip"
          Compress-Archive -Path "$staging/*" -DestinationPath $zip -Force

      - name: Patch AppImage AppRun (Arch/Wayland LD_PRELOAD fix)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" ! -name "*.tar.gz" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found, skipping patch."
            exit 0
          fi
          TAG=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          bash scripts/patch-appimage-apprun.sh "$APPIMAGE" "$TAG"

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.nsis
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
            STS2.Mod.Manager_*_x64_portable.zip
          if-no-files-found: warn
          retention-days: 7

  # After all platform builds finish, assemble the updater manifest from the
  # per-platform .sig files that tauri-action uploaded to the release.  Running
  # this in a single job after all builds eliminates the race condition where an
  # early-finishing platform would publish an incomplete latest.json.
  publish-updater:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Assemble and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-updater.sh "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}"

  # After all platform builds finish, format the release body with download links
  format-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Get the list of assets for this release
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')

          # Helper: link if asset exists
          link() {
            local file="$1" label="$2" desc="$3" bold="${4:-false}"
            if echo "$ASSETS" | grep -qF "$file"; then
              if [ "$bold" = "true" ]; then
                echo "- **[${label}](${BASE}/${file})** - ${desc}"
              else
                echo "- [${label}](${BASE}/${file}) - ${desc}"
              fi
            fi
          }

          # Extract the [VERSION] section from CHANGELOG.md so the release
          # body carries the player-facing notes inline — matching what
          # the in-app "What's new" card renders (src/lib/changelog.ts).
          # Pre-1.4.3 the body just linked to the compare URL, leaving
          # users to click out to find what changed.
          #
          # Heading shape: `## [VERSION] - YYYY-MM-DD` (date optional).
          # Section body extends until the next `## [` heading.
          NOTES_FILE=$(mktemp)
          awk -v ver="$VERSION" '
            /^## \[/ {
              heading = $0
              sub(/^## \[/, "", heading)
              sub(/\].*$/, "", heading)
              if (heading == ver) { in_block = 1; next }
              if (in_block) { in_block = 0 }
            }
            in_block { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          # Pre-compute the asset link blocks. These need shell expansion
          # (file names embed VERSION), so they're built outside the
          # heredoc / file-construction block below.
          WIN_LINKS=$(
            link "STS2.Mod.Manager_${VERSION}_x64-setup.exe" "STS2.Mod.Manager_${VERSION}_x64-setup.exe" "Recommended. Double-click to install." true
            link "STS2.Mod.Manager_${VERSION}_x64_en-US.msi" "STS2.Mod.Manager_${VERSION}_x64_en-US.msi" "Alternative MSI installer."
            link "STS2.Mod.Manager_${VERSION}_x64_portable.zip" "STS2.Mod.Manager_${VERSION}_x64_portable.zip" "Portable build (no installer, no auto-update). Used by the Nexus Mods page. Requires WebView2 Runtime."
          )
          MAC_LINKS=$(
            link "STS2.Mod.Manager_${VERSION}_universal.dmg" "STS2.Mod.Manager_${VERSION}_universal.dmg" "Works on both Intel and Apple Silicon Macs. Open the DMG and drag to Applications." true
          )
          LINUX_LINKS=$(
            link "STS2.Mod.Manager_${VERSION}_amd64.deb" "STS2.Mod.Manager_${VERSION}_amd64.deb" "For Ubuntu, Debian, Pop!_OS, Linux Mint. Install with \`sudo dpkg -i\`." true
            link "STS2.Mod.Manager-${VERSION}-1.x86_64.rpm" "STS2.Mod.Manager-${VERSION}-1.x86_64.rpm" "For Fedora, openSUSE. Install with \`sudo rpm -i\`." true
            link "STS2.Mod.Manager_${VERSION}_amd64.AppImage" "STS2.Mod.Manager_${VERSION}_amd64.AppImage" "Portable, no install needed. Works on all distros including Arch-based (CachyOS, Manjaro, EndeavourOS)." true
          )
          PREV_TAG=$(gh release list --limit 2 --json tagName --jq '.[1].tagName // empty')

          # Build the body to a file. Static per-platform install warnings
          # live in .github/release-warnings/*.md so the YAML doesn't need
          # to embed multi-line block scalars with markdown that would
          # break its indentation rules (the inline `cat <<'EOF'` approach
          # tripped the YAML scanner on the `> ...` quote-block lines).
          # Dynamic parts (title, links, diff URL, changelog notes) are
          # written via echo / printf / cat of the prepared shell vars
          # and files.
          BODY_FILE=$(mktemp)
          {
            echo "## STS2 Mod Manager ${TAG}"
            echo
            echo "### What's new"
            echo
            if [ -s "$NOTES_FILE" ]; then
              cat "$NOTES_FILE"
            else
              echo "_No changelog entry found for ${VERSION}. See the [full changelog](https://github.com/${REPO}/blob/main/CHANGELOG.md) for the history._"
            fi
            echo
            echo "### Download for your platform"
            echo
            echo "#### Windows"
            printf '%s\n' "$WIN_LINKS"
            echo
            cat .github/release-warnings/windows.md
            echo
            echo "#### macOS"
            printf '%s\n' "$MAC_LINKS"
            echo
            cat .github/release-warnings/macos.md
            echo
            echo "#### Linux"
            printf '%s\n' "$LINUX_LINKS"
            echo
            cat .github/release-warnings/linux.md
            if [ -n "$PREV_TAG" ]; then
              echo
              echo "---"
              echo
              echo "**Source diff:** https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
            fi
          } > "$BODY_FILE"

          # Update the release body
          gh release edit "$TAG" --notes-file "$BODY_FILE"

  # Upload the portable Windows zip to Nexus Mods (mod 856).
  # Runs in parallel with publish-updater + format-release so a Nexus
  # outage cannot block the GitHub Release or the in-app updater.
  # Re-run via "Re-run failed jobs" on the workflow run if Nexus is flaky.
  publish-nexus:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version + asset name
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "filename=STS2.Mod.Manager_${VERSION}_x64_portable.zip" >> "$GITHUB_OUTPUT"

      - name: Download portable zip from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" -R "${GITHUB_REPOSITORY}" -p "${{ steps.meta.outputs.filename }}"

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key:                      ${{ secrets.NEXUS_API_KEY }}
          file_group_id:                ${{ secrets.NEXUS_FILE_GROUP_ID }}
          filename:                     ${{ steps.meta.outputs.filename }}
          version:                      ${{ steps.meta.outputs.version }}
          file_category:                main
          archive_existing_file:        true
          display_name:                 STS2 Mod Manager ${{ steps.meta.outputs.version }} (Windows Portable)

  # Per-PR dev builds: gather the platform artifacts into a rolling dev-pr<N>
  # prerelease and upsert a sticky PR comment with download links. Runs whenever
  # the build job produced something — even if one platform leg failed (so a
  # flaky leg doesn't sink the whole dev delivery); skipped only when the build
  # itself was skipped or cancelled.
  publish-dev:
    if: >-
      ${{ always()
          && needs.build.result != 'skipped'
          && needs.build.result != 'cancelled'
          && github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'dev-build') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dev-artifacts

      - name: Publish rolling dev prerelease + sticky PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          SHORT=$(printf '%s' "$HEAD_SHA" | cut -c1-7)
          TAG="dev-pr${PR}"

          # Flatten downloaded artifacts into one dir of release-able files.
          mkdir -p dist
          find dev-artifacts -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.deb' \
               -o -name '*.rpm' -o -name '*.AppImage' -o -name '*_portable.zip' \) \
            -exec cp -f {} dist/ \;
          echo "Collected assets:"; ls -1 dist || true

          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -gt 0 ]; then
            # Recreate the rolling prerelease so its assets are exactly this run's.
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              gh release delete "$TAG" --repo "$REPO" --yes
            fi
            # Delete any leftover tag so create starts clean.
            git push origin ":refs/tags/$TAG" 2>/dev/null || true
            gh release create "$TAG" "${files[@]}" \
              --repo "$REPO" \
              --prerelease \
              --target "$HEAD_SHA" \
              --title "Dev build — PR #${PR} (g${SHORT})" \
              --notes "Automated dev build for PR #${PR}. Prerelease — not for end users."
          else
            echo "No artifacts collected this run (a build leg may have failed) — keeping any existing ${TAG} release."
          fi

          # Build the sticky comment body via the tested renderer, deriving the
          # asset list from the files we just collected (so it matches this run).
          node -e '
            import("./scripts/dev-build-stamp.mjs").then(async (m) => {
              const fs = await import("node:fs");
              const repo = process.env.REPO, tag = "dev-pr" + process.env.PR;
              const names = fs.existsSync("dist") ? fs.readdirSync("dist") : [];
              const platformOf = (n) => /portable\.zip$/i.test(n) ? "Windows (portable)"
                : /-setup\.exe$|\.msi$/i.test(n) ? "Windows (installer)"
                : /\.dmg$/i.test(n) ? "macOS"
                : /\.deb$/i.test(n) ? "Linux (.deb)"
                : /\.rpm$/i.test(n) ? "Linux (.rpm)"
                : /\.AppImage$/i.test(n) ? "Linux (AppImage)" : "Other";
              const base = `https://github.com/${repo}/releases/download/${tag}`;
              const assets = names.map(n => ({ platform: platformOf(n), name: n, url: `${base}/${encodeURIComponent(n)}` }))
                .sort((a, b) => a.platform.localeCompare(b.platform));
              const conf = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf-8"));
              const version = m.computeDevVersion(conf.version, process.env.PR, process.env.HEAD_SHA.slice(0, 7));
              const body = m.renderDevComment({ pr: process.env.PR, version, sha: process.env.HEAD_SHA.slice(0, 7), runUrl: process.env.RUN_URL, assets });
              fs.writeFileSync("dev-comment.md", body);
            }).catch((e) => { console.error(e); process.exit(1); });
          '

          # Upsert: find an existing sticky comment by marker, edit or create.
          MARKER="<!-- dev-build-comment -->"
          CID=$(gh api "repos/${REPO}/issues/${PR}/comments" --jq \
            "[.[] | select(.body | contains(\"${MARKER}\"))][0].id // empty")
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${CID}" -F body=@dev-comment.md >/dev/null
            echo "Updated sticky comment $CID"
          else
            gh pr comment "$PR" --repo "$REPO" --body-file dev-comment.md
            echo "Created sticky comment"
          fi
