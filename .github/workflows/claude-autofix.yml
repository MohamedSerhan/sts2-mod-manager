name: Claude auto-fix

# Write-scoped companion to claude.yml (which stays read-only / investigate).
# Two entry points:
#   - initiate: maintainer labels an issue `auto-fix` -> implement + open a dev-build PR
#   - revise:   maintainer comments `@claude ...` on an auto-fix-labeled PR -> push a revision
# Actor authorization is enforced by claude-code-action (write/admin only).
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  initiate:
    # Only when the just-added label is `auto-fix`.
    if: ${{ github.event_name == 'issues' && github.event.label.name == 'auto-fix' }}
    runs-on: ubuntu-latest
    env:
      FANOUT_MAX_PIECES: "5"   # max parallel sub-task pieces for a LARGE issue
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Assert authorized actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROLE=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" \
                   --jq '.permission' 2>/dev/null || echo "none")
          echo "Actor ${{ github.actor }} has repo permission: $ROLE"
          case "$ROLE" in
            admin|write|maintain) echo "Authorized." ;;
            *) echo "::error::Actor ${{ github.actor }} ('$ROLE') is not authorized to run the auto-fix bot."; exit 1 ;;
          esac
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run Claude (implement fix + open PR)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools Edit,Read,Write,Bash,Task
            --max-turns 100
          prompt: |
            A maintainer labeled issue #${{ github.event.issue.number }} with `auto-fix`,
            greenlighting an automated fix. Repository: ${{ github.repository }}.

            STEP 0 — GAUGE THE SCOPE FIRST. Read issue #${{ github.event.issue.number }} —
            its title, body, and any prior `@claude` investigation/triage comment. Then judge
            honestly: is this a CONTAINED change you can fully implement AND test in a single
            focused pass, or is it LARGE / open-ended (touches several modules, a feature
            spanning Rust + UI + i18n, a broad refactor, or anything you cannot confidently
            finish and verify in one pass)?

            • If it is LARGE — do NOT try to implement it all in this one context
              (you will run out of turns). Instead, FAN OUT:

              1. Decompose the work into AT MOST ${{ env.FANOUT_MAX_PIECES }}
                 INDEPENDENT pieces, each owning a DISJOINT set of files (ideally its
                 own new modules + tests). Never assign the same file to two pieces.
                 Reserve shared "glue" files (a router, a types file, an index /
                 registry, settings wiring) for YOURSELF — no piece may edit them.
                 If the work will not partition into <= ${{ env.FANOUT_MAX_PIECES }}
                 disjoint pieces, take the most independent pieces up to that cap and
                 record the rest as remaining work.
              2. Post ONE issue comment with the plan: each piece, its file scope, and
                 the glue you will wire yourself.
              3. Create the branch `auto-fix/${{ github.event.issue.number }}` off the
                 default branch (this EXACT name — a later step finds the PR by it).
              4. Spawn one subagent per piece using the Task tool, issuing the Task
                 calls together so the pieces run in parallel. Give each subagent
                 EXACTLY its piece: the goal, its disjoint file scope, and "implement
                 it AND write tests (frontend: vitest; Rust: cargo test), touch nothing
                 outside your files, and report what you changed." Each subagent has its
                 own context + turn budget — that is how this fits where one linear pass
                 would not. (If the runtime can only run them one at a time, that is
                 fine — do them sequentially; the capability is unchanged.)
              5. INTEGRATION PASS (you, after every subagent returns): edit the glue
                 files to wire the pieces together, then run the full suite (`npm test`
                 runs frontend + Rust) and fix any integration breakage until it passes.
              6. Open ONE pull request on `auto-fix/${{ github.event.issue.number }}`
                 exactly as the contained path would: the body STARTS with
                 `Fixes #${{ github.event.issue.number }}`, summarizes each piece, notes
                 whether you added a changelog entry, and — if any piece was blocked or
                 deferred — includes a "Remaining work" checklist. Do NOT apply labels.

              If a subagent fails or returns incomplete, retry it once or finish that
              piece yourself — never silently drop a piece. If the work is genuinely too
              tangled to split into disjoint pieces safely, fall back to the old
              behavior: post the plan as an issue comment and STOP (no PR).

            • If it is CONTAINED, proceed:
              1. Investigate the codebase and implement the fix on a NEW branch named EXACTLY
                 `auto-fix/${{ github.event.issue.number }}` (no suffix or slug — a later
                 workflow step locates the PR by this exact branch name). Branch off the
                 default branch.
              2. Write unit tests that cover the fix (follow the repo's conventions —
                 frontend: vitest; Rust: #[test] / cargo test). Run the relevant tests
                 (`npm test` runs the frontend + Rust suites; for a Rust-only change
                 `cargo test --manifest-path=src-tauri/Cargo.toml`) and iterate until they
                 pass. CI will also run the full suite on the PR.
              3. If — and only if — the change is user-facing, add ONE concise, player-
                 language bullet to the `[Unreleased]` section of CHANGELOG.md under the
                 right heading (Added/Changed/Fixed/Security), following the CHANGELOG
                 "Writing rules" (no file paths, function names, or dev-speak; one short
                 active-voice sentence). Skip the changelog for internal-only changes.
              4. Open a pull request targeting `main` whose body STARTS with
                 `Fixes #${{ github.event.issue.number }}`, summarizes the change, notes
                 whether you added a changelog entry, and explains how to test it via the
                 dev build. Do NOT apply any labels — a workflow step applies them after
                 you finish.

            NEVER finish having silently done nothing. Every run must end in exactly one of:
            a PR opened (contained fix), or a comment posted on the issue (a plan for a
            too-large change, or — if you cannot produce a confident fix — a precise
            explanation of what blocks it).

      - name: Apply dev-build + auto-fix + qa labels (PAT so build + QA trigger)
        id: label
        if: always()
        env:
          # Apply the labels with a PAT, not the default GITHUB_TOKEN: a label added by
          # GITHUB_TOKEN does NOT trigger the build workflow (anti-recursion). Applying
          # them here (rather than letting Claude add them) also avoids a no-op re-add
          # that would generate no `labeled` event. No-op if Claude opened no PR.
          GH_TOKEN: ${{ secrets.DEV_BUILD_LABEL_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          PR=$(gh pr list --repo "$REPO" --head "auto-fix/${ISSUE}" --state open \
                 --json number --jq '.[0].number // empty')
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          if [ -z "$PR" ]; then
            echo "No PR on branch auto-fix/${ISSUE} (Claude declined, posted a plan, or errored). Nothing to label."
            exit 0
          fi
          gh pr edit "$PR" --repo "$REPO" --add-label dev-build --add-label auto-fix --add-label qa
          echo "Labeled PR #$PR with dev-build + auto-fix + qa."

      - name: Report back if the bot errored without opening a PR
        # Never fail silently. If Claude errored (e.g. hit the step cap) and opened no PR,
        # leave a comment so the maintainer isn't left staring at a red run with no context.
        # When Claude finishes cleanly without a PR it has already commented (a plan for a
        # too-large task, or the blocker), so this only fires on an actual error.
        if: ${{ always() && steps.claude.outcome == 'failure' && steps.label.outputs.pr == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE" --repo "$REPO" --body "$(printf '%s\n' \
            "🤖 The auto-fix bot couldn't complete this one automatically — it errored or ran out of steps before opening a PR." \
            "" \
            "This usually means the change is too large or open-ended for a single automated pass. A maintainer can split it into smaller issues or drive it manually." \
            "" \
            "Run log: ${RUN_URL}" \
            "" \
            "_Re-apply the \`auto-fix\` label to retry._")"
          echo "Posted a no-PR failure comment on issue #${ISSUE}."

  revise:
    # Only `@claude` comments on a PR that carries the `auto-fix` or `qa` label.
    if: >-
      ${{ ((github.event_name == 'issue_comment'
              && github.event.issue.pull_request
              && (contains(github.event.issue.labels.*.name, 'auto-fix')
                  || contains(github.event.issue.labels.*.name, 'qa'))
              && contains(github.event.comment.body, '@claude'))
           || (github.event_name == 'pull_request_review_comment'
              && (contains(github.event.pull_request.labels.*.name, 'auto-fix')
                  || contains(github.event.pull_request.labels.*.name, 'qa'))
              && contains(github.event.comment.body, '@claude'))) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Assert authorized actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROLE=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" \
                   --jq '.permission' 2>/dev/null || echo "none")
          echo "Actor ${{ github.actor }} has repo permission: $ROLE"
          case "$ROLE" in
            admin|write|maintain) echo "Authorized." ;;
            *) echo "::error::Actor ${{ github.actor }} ('$ROLE') is not authorized to run the auto-fix bot."; exit 1 ;;
          esac
      - name: Checkout
        # Seeds the workspace + git config; claude-code-action switches to the
        # PR branch itself in tag mode, so we don't check out the PR head here.
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run Claude (revise the auto-fix PR)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools Edit,Read,Write,Bash
            --max-turns 40
          # No explicit prompt: the action picks up the triggering @claude comment as the
          # instruction (tag mode). It checks out the PR branch, applies the requested change,
          # re-runs tests, and pushes to the same branch -> the dev build rebuilds.
