name: Nexus find thread ID (one-off diagnostic)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Explore searchComments filter query structure
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          echo "=== All types with 'filter' or 'search' in name ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __schema { types { name kind } } }"}' | \
            jq '[.data.__schema.types[] | select(.name | test("(?i)filter|search|where|condition|query")) | {name, kind}]'

          echo
          echo "=== searchComments with threadId filter [16866026] ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { searchComments(filter: {threadId: [\"16866026\"]}, first: 3) { nodes { id body createdAt creator { name } } totalCount } }"}' | jq .

          echo
          echo "=== commentThread with uid as id ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { commentThread(commentThreadId: \"38293928411992\") { id comments(first: 1) { totalCount nodes { id } } } }"}' | jq .
