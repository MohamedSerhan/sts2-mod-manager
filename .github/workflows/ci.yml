name: CI

# Change-aware required gate. The single `CI Gate` check (set required in branch
# protection) passes only if every check RELEVANT to the change succeeded; a
# correctly-skipped job counts as not-applicable. See the spec.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      openai_smoke:
        description: "Run only the OpenAI API-key smoke test"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.classify.outputs.app }}
      scripts: ${{ steps.classify.outputs.scripts }}
      workflows: ${{ steps.classify.outputs.workflows }}
      qa: ${{ steps.classify.outputs.qa }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Classify changed files
        id: classify
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          elif [ "${{ github.event_name == 'workflow_dispatch' && inputs.openai_smoke }}" = "true" ]; then
            CHANGED=""
          else
            # workflow_dispatch: run everything.
            CHANGED=$(printf 'src/x\nsrc-tauri/x\nscripts/x\n.github/workflows/x\nqa/x\n')
          fi
          printf '%s\n' "$CHANGED" | node scripts/ci-changes.mjs classify >> "$GITHUB_OUTPUT"
          echo "--- buckets ---"; printf '%s\n' "$CHANGED" | node scripts/ci-changes.mjs classify

  compile:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' || needs.changes.outputs.scripts == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

  qa-matrix:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' || needs.changes.outputs.qa == 'true' || needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflows == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: QA interaction inventory report
        run: npm run qa:matrix

  test-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Frontend tests + coverage gate (vitest)
        # qa:coverage = `vitest run --coverage`, which ALSO enforces the
        # thresholds declared in vitest.config.ts. Use it (not qa:unit) so a
        # coverage regression is caught in the PR gate, not only at release.
        # (`npm test` would ALSO run cargo test, which test-rust covers.)
        run: npm run qa:coverage

  test-rust:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    # cargo test on all three OSes. The redesign touches OS-divergent surface
    # (file moves with rename->copy fallback, archive extraction, path
    # normalization, the notify watcher, case-sensitive-FS matching) that a
    # Linux-only leg never exercised. fail-fast: false so one OS failing still
    # reports the others.
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: test-rust-${{ matrix.platform }}
      - name: Rust tests (default features)
        run: cargo test --manifest-path=src-tauri/Cargo.toml
      - name: Rust tests (qa-cassette feature)
        # The cassette-gated integration tests compile/run only under this
        # feature. Without this step, a signature drift in cassette-only code
        # (or its fixtures) surfaces only at release, not in the PR gate.
        run: cargo test --manifest-path=src-tauri/Cargo.toml --features qa-cassette

  app-build:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev squashfs-tools
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ci-gate-${{ matrix.platform }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build (verify it bundles on this platform)
        # Build-only: empty tagName => no release, no upload (includeUpdaterJson off).
        # The signing key IS required: tauri.conf.json sets
        # bundle.createUpdaterArtifacts: true, so the build errors without it. We still
        # publish nothing — this just lets the bundle build so we can verify it compiles.
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ""
          releaseName: ""
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  # Tier-2 UI smoke: WebDriver (tauri-driver -> msedgedriver -> WebView2) drives
  # the built Windows app through a deterministic cassette (offline, recorded
  # GitHub/Nexus responses). Windows-only because it targets WebView2/Edge.
  smoke:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' || needs.changes.outputs.qa == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install tauri-driver
        # 2.0.6 is the version validated against current WebView2 — 0.1.x is broken
        # (WebView2 147+ schema change; see qa/runner/smoke.mjs). --locked for determinism.
        run: cargo install tauri-driver --version 2.0.6 --locked
      - name: Download matching msedgedriver (reads the runner's WebView2 version)
        run: node qa/runner/scripts/download-msedgedriver.mjs
      - name: Build app (qa-cassette feature, --no-bundle => no signing needed)
        run: npm run qa:smoke:build
      - name: WebDriver smoke (deterministic cassette)
        run: npm run qa:smoke:cassette

  # Linux WebDriver smoke: tauri-driver forwards to WebKitWebDriver under Xvfb.
  # This exercises the WebKitGTK stack that Windows/WebView2 never touches.
  smoke-linux:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' || needs.changes.outputs.qa == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev webkit2gtk-driver xvfb dbus-x11
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: smoke-linux
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install tauri-driver
        run: cargo install tauri-driver --version 2.0.6 --locked
      - name: Build app (qa-cassette feature, --no-bundle => no signing needed)
        run: npm run qa:smoke:build
      - name: WebDriver smoke (Linux deterministic cassette)
        run: xvfb-run -a npm run qa:smoke:cassette

  script-tests:
    needs: changes
    if: ${{ needs.changes.outputs.scripts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Script unit tests
        run: |
          node --test scripts/dev-build-stamp.test.mjs
          node --test scripts/make-dev-icon.test.mjs
          node --test scripts/ci-changes.test.mjs
          node --test scripts/qa-coverage-matrix.test.mjs
          node --test scripts/release-windows-installer-policy.test.mjs
          node --test scripts/changelog-fragments.test.mjs
          node --test scripts/changelog-translations.test.mjs
          node --test scripts/translate-changelog.test.mjs

  workflow-lint:
    needs: changes
    if: ${{ needs.changes.outputs.workflows == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: YAML parse all workflows
        run: |
          python -c "import yaml,glob; [yaml.safe_load(open(f)) for f in glob.glob('.github/workflows/*.yml')]; print('YAML OK')"
      - name: actionlint
        uses: raven-actions/actionlint@v2
        env:
          # SC2016 (single-quoted $ won't expand) is a chronic false-positive on our
          # run blocks that embed node -e / python -c / jq with intentional single quotes.
          SHELLCHECK_OPTS: --exclude=SC2016

  openai-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.openai_smoke }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Verify OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHANGELOG_TRANSLATE_MODEL: ${{ vars.CHANGELOG_TRANSLATE_MODEL || 'gpt-5' }}
        run: |
          node --input-type=module <<'NODE'
          import OpenAI from 'openai';

          if (!process.env.OPENAI_API_KEY) {
            console.error('OPENAI_API_KEY is not available to this workflow.');
            process.exit(1);
          }

          const model = process.env.CHANGELOG_TRANSLATE_MODEL || 'gpt-5';
          const client = new OpenAI();
          const response = await client.responses.create({
            model,
            input: 'Reply with exactly: OK',
            max_output_tokens: 32,
          });

          if (!response.id) {
            console.error('OpenAI response did not include an id.');
            process.exit(1);
          }

          console.log(`OpenAI smoke OK using ${model}. Response id: ${response.id}`);
          NODE

  changelog:
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.app == 'true' && !contains(github.event.pull_request.labels.*.name, 'no-changelog') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Require a new changelog entry (fragment or [Unreleased] bullet)
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          BASE_BULLETS=$(git show "$BASE_SHA:CHANGELOG.md" 2>/dev/null | node scripts/ci-changes.mjs unreleased-count || true)
          BASE_BULLETS=${BASE_BULLETS:-0}
          BASE_FRAGS=$(git ls-tree -r --name-only "$BASE_SHA" -- changelog.d 2>/dev/null \
            | { grep -E 'changelog\.d/(added|changed|fixed|security)-.*\.md$' || true; } \
            | wc -l)
          BASE_COUNT=$((BASE_BULLETS + BASE_FRAGS))
          HEAD_COUNT=$(node scripts/ci-changes.mjs changelog-count)
          echo "changelog signal — base: $BASE_COUNT (bullets=$BASE_BULLETS frags=$BASE_FRAGS), head: $HEAD_COUNT"
          if [ "$HEAD_COUNT" -le "$BASE_COUNT" ]; then
            echo "::error::App code changed but no new changelog entry was added. Add a changelog.d/<category>-<slug>.md fragment, or an [Unreleased] CHANGELOG bullet, in player-language — or label the PR 'no-changelog' for internal-only changes."
            exit 1
          fi
      - name: Require localized changelog fragments
        run: node scripts/changelog-translations.mjs check-fragments

  ci-gate:
    name: CI Gate
    needs: [changes, qa-matrix, compile, test-frontend, test-rust, app-build, smoke, smoke-linux, script-tests, workflow-lint, changelog]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every relevant check passed
        run: |
          fail=0
          check() { echo "$1: $2"; if [ "$2" = "failure" ] || [ "$2" = "cancelled" ]; then fail=1; fi; }
          check "changes"       "${{ needs.changes.result }}"
          check "qa-matrix"     "${{ needs.qa-matrix.result }}"
          check "compile"       "${{ needs.compile.result }}"
          check "test-frontend" "${{ needs.test-frontend.result }}"
          check "test-rust"     "${{ needs.test-rust.result }}"
          check "app-build"     "${{ needs.app-build.result }}"
          check "smoke"         "${{ needs.smoke.result }}"
          check "smoke-linux"   "${{ needs.smoke-linux.result }}"
          check "script-tests"  "${{ needs.script-tests.result }}"
          check "workflow-lint" "${{ needs.workflow-lint.result }}"
          check "changelog"     "${{ needs.changelog.result }}"
          if [ "$fail" = "1" ]; then echo "::error::CI Gate failed — a relevant check did not pass."; exit 1; fi
          echo "CI Gate passed (skipped jobs were not relevant to this change)."
