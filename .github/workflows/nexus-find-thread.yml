name: Nexus find thread ID (one-off diagnostic)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Query mod type and mod 856 for thread ID hints
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          echo "=== Mod 856 top-level fields ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { mod(id: 856, gameId: 8916) { id name } }"}' | jq .

          echo
          echo "=== Mod type fields ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"Mod\") { fields { name } } }"}' | jq '.data.__type.fields[].name'

          echo
          echo "=== Root Query fields containing thread/comment/post ==="
          curl -sS -X POST https://api.nexusmods.com/v2/graphql \
            -H "Content-Type: application/json" \
            -H "apikey: $NEXUS_API_KEY" \
            -d '{"query":"query { __type(name: \"Query\") { fields { name } } }"}' | \
            jq '[.data.__type.fields[].name | select(test("(?i)thread|comment|post|forum|review"))]'
